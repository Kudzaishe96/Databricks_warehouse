name: main

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  # --- DEVELOPMENT DEPLOYMENT ---
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABRICKS_HOST: ${{ secrets.DEV_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOYMENT_TARGET_TOKEN }}
      REPO_PATH: "/Workspace/Users/kudzaishemanyanya1@gmail.com/Databricks_warehouse"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ upgraded to Node.js 24 compatible version

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main   # ✅ pin to stable release instead of @main

      - name: Update Databricks Repo (Dev)
        run: |
          databricks repos update "${{ env.REPO_PATH }}" --branch main

  # --- PRODUCTION DEPLOYMENT ---
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev  # <--- ensures Prod only updates if Dev succeeds
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABRICKS_HOST: ${{ secrets.PROD_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOYMENT_TARGET_TOKEN }}
      REPO_PATH: "/Workspace/Users/kudziemanyanya@gmail.com/Databricks_warehouse"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ upgraded

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main   # ✅ pinned

      - name: Update Databricks Repo (Prod)
        run: |
          databricks repos update "${{ env.REPO_PATH }}" --branch main
